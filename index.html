<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>文系大学院生アーニャbotの質問箱まとめ</title>

<style>
body {
  margin: 0;
  font-family: "Hiragino Kaku Gothic ProN", sans-serif;
  background: linear-gradient(135deg, #ffd6e0, #d6f0ff, #fff5c3);
}

.container {
  padding: 20px;
}

.card {
  background: white;
  padding: 15px;
  margin: 10px 0;
  border-radius: 20px;
  box-shadow: 0 5px 15px rgba(0,0,0,0.1);
}

header {
  text-align: center;
  padding: 20px;
  font-size: 22px;
  font-weight: bold;
  background: linear-gradient(90deg, #ff9ecf, #9edbff);
  color: white;
}

.subtitle {
  text-align: center;
  margin-top: 10px;
  font-size: 16px;
}

input, textarea {
  width: 100%;
  margin: 5px 0;
  padding: 10px;
  border-radius: 10px;
  border: 1px solid #ccc;
}

button {
  margin: 5px;
  padding: 8px 12px;
  border: none;
  border-radius: 10px;
  cursor: pointer;
}

.add { background: #ff9ecf; color: white; }
.delete { background: #ff6b6b; color: white; }
.edit { background: #6bcfff; color: white; }
.back { background: #aaa; color: white; }

</style>
</head>

<body>

<header>文系大学院生アーニャbotの質問箱まとめ</header>

<div class="container">

<div id="home">
  <div class="subtitle">質問のジャンルを選択</div>

  <input id="newCategory" placeholder="新しいジャンル">
  <button class="add" onclick="addCategory()">＋ジャンル追加</button>

  <div id="categoryList"></div>
</div>

<div id="questions" style="display:none;">
  <button class="back" onclick="goHome()">←戻る</button>

  <h3 id="categoryTitle"></h3>

  <input id="qTitle" placeholder="質問タイトル">
  <textarea id="qContent" placeholder="質問内容"></textarea>
  <button class="add" onclick="addQuestion()">＋質問追加</button>

  <div id="questionList"></div>
</div>

</div>

<!-- Firebase（これだけ使う） -->
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyCgPWu1wf2BvrsjgHwPg8Z3Dbiwf2u6GsM",
  authDomain: "anyaquestionboxanswers.firebaseapp.com",
  projectId: "anyaquestionboxanswers"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

let currentCategory = "";

/* ジャンル追加 */
function addCategory() {
  const name = document.getElementById("newCategory").value;
  if (!name) return;

  db.collection("categories").add({ name });
  document.getElementById("newCategory").value = "";
}

/* ジャンル表示 */
function loadCategories() {
  db.collection("categories").onSnapshot(snapshot => {
    const list = document.getElementById("categoryList");
    list.innerHTML = "";

    snapshot.forEach(doc => {
      const data = doc.data();

      const div = document.createElement("div");
      div.className = "card";

      div.innerHTML = `
        <b onclick="openCategory('${doc.id}', '${data.name}')">${data.name}</b>
        <button class="delete" onclick="deleteCategory('${doc.id}')">削除</button>
      `;

      list.appendChild(div);
    });
  });
}

/* ジャンル削除 */
function deleteCategory(id) {
  db.collection("categories").doc(id).delete();
}

/* ジャンル開く */
function openCategory(id, name) {
  currentCategory = id;

  document.getElementById("home").style.display = "none";
  document.getElementById("questions").style.display = "block";
  document.getElementById("categoryTitle").innerText = name;

  loadQuestions();
}

/* 戻る */
function goHome() {
  document.getElementById("home").style.display = "block";
  document.getElementById("questions").style.display = "none";
}

/* 質問追加 */
function addQuestion() {
  const title = document.getElementById("qTitle").value;
  const content = document.getElementById("qContent").value;

  if (!title) return;

  db.collection("categories")
    .doc(currentCategory)
    .collection("questions")
    .add({ title, content });

  document.getElementById("qTitle").value = "";
  document.getElementById("qContent").value = "";
}

/* 質問表示 */
function loadQuestions() {
  db.collection("categories")
    .doc(currentCategory)
    .collection("questions")
    .onSnapshot(snapshot => {

      const list = document.getElementById("questionList");
      list.innerHTML = "";

      snapshot.forEach(doc => {
        const data = doc.data();

        const div = document.createElement("div");
        div.className = "card";

        div.innerHTML = `
          <h4>${data.title}</h4>
          <p>${data.content}</p>
          <button class="edit" onclick="editQuestion('${doc.id}', '${data.title}', '${data.content}')">編集</button>
          <button class="delete" onclick="deleteQuestion('${doc.id}')">削除</button>
        `;

        list.appendChild(div);
      });
    });
}

/* 削除 */
function deleteQuestion(id) {
  db.collection("categories")
    .doc(currentCategory)
    .collection("questions")
    .doc(id)
    .delete();
}

/* 編集 */
function editQuestion(id, oldTitle, oldContent) {
  const newTitle = prompt("タイトル編集", oldTitle);
  const newContent = prompt("内容編集", oldContent);

  if (!newTitle) return;

  db.collection("categories")
    .doc(currentCategory)
    .collection("questions")
    .doc(id)
    .update({
      title: newTitle,
      content: newContent
    });
}

/* 初期化 */
loadCategories();
</script>

</body>
</html>
